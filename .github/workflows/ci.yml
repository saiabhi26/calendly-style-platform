name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    # A throwaway Postgres for the job — same engine as production (Neon).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appointments
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/appointments
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/appointments_test
      # Test-only secrets — never the production values.
      JWT_SECRET: ci-test-jwt-secret-please-ignore-0123456789
      JWT_REFRESH_SECRET: ci-test-refresh-secret-please-ignore-0123456789

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run migrations from scratch
        run: alembic upgrade head

      - name: Tests (pytest)
        run: pytest
