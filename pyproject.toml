# Tooling config only (no packaging metadata). Used by ruff and pytest.

[tool.ruff]
line-length = 100
# Autogenerated migrations are noisy; lint our own code, not Alembic's output.
exclude = ["alembic"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
# Put the repo root on sys.path so `import app` works under the bare `pytest`
# console script (which, unlike `python -m pytest`, doesn't add the cwd).
pythonpath = ["."]
